name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-run:
    runs-on: self-hosted
    steps:
      # 1. Download the latest code from your repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Build the Docker image using your specified tag
      - name: Build Docker image
        run: docker build -t ai_project_ec2_deployment .

      # 3. Clean up old container if it exists (prevents naming conflicts)
      - name: Stop and remove old container
        run: |
          docker stop ai_container || true
          docker rm ai_container || true

      # 4. Run the new container
      - name: Run container
        run: |
          docker run -d -p 8501:8501 --name ai_container ai_project_ec2_deployment